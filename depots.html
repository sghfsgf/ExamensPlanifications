<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Dépôts - SGH Planification</title>
<style>
body { font-family: Arial, sans-serif; margin:0; padding:0; background:#f4f4f4; }
nav { background:#778899; padding:10px; }
nav ul { list-style:none; display:flex; gap:20px; margin:0; padding:0; }
nav ul li a { color:white; font-weight:bold; text-decoration:none; }
main { padding:20px; }
label { display:block; margin-top:10px; font-weight:bold; }
input, select { padding:5px; width:300px; margin-top:5px; }
button { margin-top:15px; padding:8px 15px; background:#778899; color:white; border:none; cursor:pointer; font-weight:bold; }
button:hover { background:#5a6b7a; }
#message { margin-top:15px; font-weight:bold; }
footer { background:#FF8C00; color:white; text-align:center; padding:15px; margin-top:30px; font-weight:bold; }
</style>
</head>
<body>

<nav>
<ul>
  <li><a href="index.html">Accueil</a></li>
  <li><a href="examens.html">Examens</a></li>
  <li><a href="surveillances.html">Surveillances</a></li>
  <li><a href="depots.html">Dépôts</a></li>
  <li><a href="reclamations.html">Réclamations</a></li>
</ul>
</nav>

<main>
<h1>Déposer un fichier</h1>
<form id="formDepot">
  <label>Nom et Prénom</label>
  <input type="text" id="nomPrenom" required>

  <label>Email</label>
  <input type="email" id="email" required>

  <label>Département</label>
  <select id="departement" required>
    <option value="">--Chargement--</option>
  </select>

  <label>Fichier à déposer (PDF, Excel, Word)</label>
  <input type="file" id="fichier" accept=".pdf,.xls,.xlsx,.doc,.docx" required>

  <button type="submit">Envoyer</button>
  <div id="message"></div>
</form>
</main>

<footer>
&copy; 2026 SGH pour Planification et Programmation
</footer>

<script>
const form = document.getElementById('formDepot');
const selectDep = document.getElementById('departement');

// Charger dynamiquement les départements depuis Apps Script
window.addEventListener('DOMContentLoaded', () => {
  fetch('TON_URL_APPS_SCRIPT')  // Remplace par l'URL de ton Apps Script
    .then(res => res.json())
    .then(data => {
      selectDep.innerHTML = '<option value="">--Choisir--</option>';
      data.departements.forEach(dep => {
        const option = document.createElement('option');
        option.value = dep;
        option.textContent = dep;
        selectDep.appendChild(option);
      });
    })
    .catch(err => {
      console.error('Erreur chargement départements :', err);
      selectDep.innerHTML = '<option value="">Erreur chargement départements</option>';
    });
});

// Gestion de l'envoi du formulaire
form.addEventListener('submit', e => {
  e.preventDefault();
  const messageDiv = document.getElementById('message');
  messageDiv.style.color = 'black';
  messageDiv.textContent = 'Envoi en cours...';

  const formData = new FormData();
  formData.append('nomPrenom', document.getElementById('nomPrenom').value);
  formData.append('email', document.getElementById('email').value);
  formData.append('departement', document.getElementById('departement').value);
  formData.append('fichier', document.getElementById('fichier').files[0]);

  fetch('TON_URL_APPS_SCRIPT', {  // Remplace par l'URL de ton Apps Script
    method: 'POST',
    body: formData
  })
  .then(res => res.json())
  .then(data => {
    if(data.status==='success'){
      messageDiv.style.color='green';
      messageDiv.textContent = data.message;
      form.reset();
      selectDep.selectedIndex = 0; // remettre le select au choix vide
    } else {
      messageDiv.style.color='red';
      messageDiv.textContent = data.message;
    }
  })
  .catch(err => {
    messageDiv.style.color='red';
    messageDiv.textContent = 'Erreur : ' + err;
  });
});
</script>

</body>
</html>

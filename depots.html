<!DOCTYPE html>
<html lang="fr">
<head>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#7aa1c4">  
  <meta charset="UTF-8">
  <title>Dépôts</title>
  <style>
    body { font-family: Arial; margin:0; background:#f0f4f8; }
.active-page {
  color: darkorange !important;
  text-shadow: 0px 0px 5px rgba(255,140,0,0.5);
}
    /* Barre de navigation */
    nav { background-color:#5F9EA0; padding:10px 20px; display:flex; gap:15px; }
    nav a { color:white; text-decoration:none; font-weight:bold; font-size:26px; }
    nav a:hover { text-decoration:underline; }

    /* Contenu principal aligné au centre */
   main { 
  padding:20px; 
  max-width:600px;       /* largeur du formulaire */
  margin:20px;           /* pas centré, commence à gauche */
}

    form { background:#fff; padding:20px; border-radius:8px; box-shadow:0 0 5px rgba(0,0,0,0.1);}
    label { display:block; margin-top:10px; font-weight:bold; text-align:left; }
    input, select { width:100%; padding:8px; margin-top:5px; border-radius:4px; border:1px solid #ccc; }
    button { margin-top:15px; padding:10px 20px; background-color:#5a8dee; color:white; border:none; border-radius:4px; cursor:pointer; }
    button:hover { background-color:#466fc0; }
    #message { margin-top:15px; font-weight:bold; text-align:left; }

    /* Footer */
    footer { margin-top:40px; background-color:#ff8000; color:white; text-align:center; padding:15px; }
  </style>
</head>
<body>

  <!-- Barre de navigation -->
  <nav>
    <a href="index.html">Accueil</a>
    <a href="examens.html">Examens</a>
    <a href="surveillances.html">Surveillances</a>
    <a href="depots.html">Dépôts</a>
    <a href="reclamations.html">Réclamations</a>
  </nav>

  <!-- Contenu principal -->
  <main>
    <h1>Dépôt de fichiers</h1>
    <form id="depotForm" enctype="multipart/form-data">
      <label>Nom et Prénom</label>
      <input type="text" name="nomPrenom" required>

      <label>Email</label>
      <input type="email" name="email" required>

      <label>Département</label>
      <select name="departement" id="departement" required>
        <option value="">--Choisir--</option>
      </select>

      <label>Fichier</label>
      <input type="file" name="fichier" required>

      <button type="submit">Envoyer</button>
    </form>

    <div id="message"></div>
  </main>

  <!-- Footer -->
  <footer>
    &copy; 2026 SGH pour Planification et Programmation
  </footer>

  <!-- Script pour départements et envoi -->
  <script>
    const form = document.getElementById('depotForm');
    const messageDiv = document.getElementById('message');

    // URL publique /exec de ton Apps Script SGH_Depots
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyHkxwoqn7XPxC1b6DzwBsrH9tv-OdqKQiDSf4dRB49L72gi8T2TLQlZa13xMbq31sy/exec";

    // Départements pré-remplis
    const departements = ["SV","ST","INFO","CH","PHYS","FT","Maths","LANGUES"];
    const select = document.getElementById('departement');
    select.innerHTML = '<option value="">--Choisir--</option>';
    departements.forEach(dep => {
      const option = document.createElement('option');
      option.value = dep;
      option.textContent = dep;
      select.appendChild(option);
    });

    // Gestion du formulaire avec base64 pour Apps Script
    form.addEventListener('submit', e => {
      e.preventDefault();
      messageDiv.textContent = "Envoi en cours...";
      messageDiv.style.color = "black";

      const nomPrenom = form.nomPrenom.value.trim();
      const email = form.email.value.trim();
      const departement = form.departement.value;
      const fileInput = form.fichier.files[0];

      if(!fileInput) {
        messageDiv.textContent = "Veuillez choisir un fichier !";
        messageDiv.style.color = "red";
        return;
      }

      const reader = new FileReader();
      reader.onload = async function() {
        const base64File = reader.result.split(',')[1];

        const payload = {
          nomPrenom: nomPrenom,
          email: email,
          departement: departement,
          fileName: fileInput.name,
          mimeType: fileInput.type,
          file: base64File
        };

        try {
          const response = await fetch(APPS_SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify(payload)
          });

          const data = await response.json();
          if(data.status === "success"){
            messageDiv.textContent = "Fichier envoyé avec succès ! ✅";
            messageDiv.style.color = "green";
            form.reset();
          } else {
            messageDiv.textContent = "Erreur : " + data.message;
            messageDiv.style.color = "red";
          }

        } catch(err) {
          console.error(err);
          messageDiv.textContent = "Erreur serveur, réessaye plus tard.";
          messageDiv.style.color = "red";
        }
      };

      reader.readAsDataURL(fileInput);
    });
  </script>

  <script>
    // Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(() => console.log('Service Worker enregistré !'))
        .catch(err => console.log('Erreur Service Worker :', err));
    }
  </script>
<script>
window.addEventListener("DOMContentLoaded", () => {

  const page = window.location.pathname.split("/").pop();

  document.querySelectorAll("nav a").forEach(link => {

    const href = link.getAttribute("href");

    if (href === page || (page === "" && href === "index.html")) {
      link.classList.add("active-page");
    }

  });

});
</script>
</body>
</html>

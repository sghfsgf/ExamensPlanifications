<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Dépôts</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f7f7f7;
    }
    h1 {
      color: #333;
    }
    form {
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
      max-width: 500px;
    }
    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }
    input, select, textarea {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border-radius: 4px;
      border: 1px solid #ccc;
    }
    button {
      margin-top: 15px;
      padding: 10px 20px;
      background-color: #5a8dee;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background-color: #466fc0;
    }
    #message {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>Dépôt de fichiers</h1>
  <form id="depotForm">
    <input type="hidden" name="formType" value="depot">

    <label>Nom et Prénom</label>
    <input type="text" name="nomPrenom" required>

    <label>Email</label>
    <input type="email" name="email" required>

    <label>Département</label>
    <select name="departement" id="departement" required>
      <option value="">--Chargement--</option>
    </select>

    <label>Fichier</label>
    <input type="file" name="fichier" required>

    <button type="submit">Envoyer</button>
  </form>

  <div id="message"></div>

  <script>
    const form = document.getElementById('depotForm');
    const messageDiv = document.getElementById('message');

    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw867roTSIYFUzePWuTdVEr6jvgcHF6KDIyIa045HmKRKk70kuciA51pEpthnnQdc91/exec"; // <-- mets ici ton URL /exec publique

    // Charger les départements dynamiquement
    fetch(APPS_SCRIPT_URL)
      .then(res => res.json())
      .then(data => {
        const select = document.getElementById('departement');
        select.innerHTML = '<option value="">--Choisir--</option>';
        data.departements.forEach(dep => {
          const option = document.createElement('option');
          option.value = dep;
          option.textContent = dep;
          select.appendChild(option);
        });
      })
      .catch(err => {
        console.error('Erreur chargement départements :', err);
        messageDiv.textContent = "Impossible de charger les départements. Réessaie plus tard.";
        messageDiv.style.color = "red";
      });

    // Gestion du formulaire
    form.addEventListener('submit', e => {
      e.preventDefault();
      messageDiv.textContent = "Envoi en cours...";
      messageDiv.style.color = "black";

      const formData = new FormData(form);

      fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        body: formData
      })
      .then(res => res.json())
      .then(data => {
        if(data.status === "success"){
          messageDiv.textContent = data.message;
          messageDiv.style.color = "green";
          form.reset();
        } else {
          messageDiv.textContent = data.message;
          messageDiv.style.color = "red";
        }
      })
      .catch(err => {
        console.error(err);
        messageDiv.textContent = "Erreur serveur, réessaye plus tard.";
        messageDiv.style.color = "red";
      });
    });
  </script>
</body>
</html>

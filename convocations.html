<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convocations</title>

<style>

body{
  font-family:Arial, sans-serif;
  background:#f4f4f4;
  margin:0;
  padding:0;
}

/* ===== NAV ===== */
nav{
  background:#5F9EA0;
  padding:12px;
}

nav ul{
  list-style:none;
  margin:0;
  padding:0;
  display:flex;
  gap:20px;
}

nav ul li a{
  color:white;
  text-decoration:none;
  font-size:18px;
  font-weight:bold;
}

/* ===== CONTAINER ===== */
.container{
  max-width:600px;
  margin:40px auto;
  background:white;
  padding:25px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.15);
}

h1{
  text-align:center;
  color:#333;
}

label{
  font-weight:bold;
  display:block;
  margin-top:15px;
}

select, button{
  width:100%;
  padding:12px;
  margin-top:8px;
  font-size:16px;
  border-radius:6px;
  border:1px solid #ccc;
}

button{
  background:#0b7dda;
  color:white;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  background:#095ea8;
}

#loading{
  display:none;
  text-align:center;
  margin-top:15px;
  font-weight:bold;
}

#resultat{
  margin-top:20px;
  text-align:center;
}

#resultat a{
  background:#28a745;
  color:white;
  padding:12px 18px;
  border-radius:6px;
  text-decoration:none;
  display:inline-block;
  font-weight:bold;
}

/* ===== FOOTER ===== */
footer{
  margin-top:40px;
  background:#FF8C00;
  color:white;
  text-align:center;
  padding:15px;
  font-weight:bold;
}

</style>

</head>

<body>

<!-- ===== NAV ===== -->
<nav>
  <ul>
    <li><a href="index.html">Accueil</a></li>
    <li><a href="examens.html">Examens</a></li>
    <li><a href="surveillances.html">Surveillances</a></li>
    <li><a href="convocations.html">Convocations</a></li>
    <li><a href="depots.html">Dépôts</a></li>
    <li><a href="reclamations.html">Réclamations</a></li>
  </ul>
</nav>

<!-- ===== CONTENU ===== -->
<div class="container">

<h1>Génération des Convocations</h1>

<label>Département</label>
<select id="dep">
  <option value="">Choisir département</option>
</select>

<label>Enseignant</label>
<select id="enseignant">
  <option value="">Choisir enseignant</option>
</select>

<label>Date</label>
<input id="date" type="text" placeholder="ex: 18/05/2026">

<button onclick="generer()">Générer Convocation PDF</button>

<div id="loading">⏳ Génération en cours...</div>
<div id="resultat"></div>

</div>

<!-- ===== FOOTER ===== -->
<footer>
  &copy; 2026 SGH pour Planification et Programmation
</footer>

<!-- ===== SCRIPT ===== -->
<script>

const WEBAPP =
"https://script.google.com/macros/s/AKfycbyZg4xjXxVHMwezbmL3YgdBN-2vudMsaMQ_ScvSV5MsrJn5Mwk6HdRt_wROb2nFk-jc/exec";


// ===================== CHARGER DEPARTEMENTS =====================
fetch(WEBAPP)
.then(res => res.json())
.then(data => {

  let selectDep = document.getElementById("dep");

  data.departements.forEach(dep => {

    selectDep.innerHTML += `<option value="${dep.nom}">${dep.nom}</option>`;

  });

})
.catch(err => {
  console.log("Erreur chargement départements", err);
});


// ===================== CHARGER ENSEIGNANTS =====================
document.getElementById("dep")
.addEventListener("change", function(){

  let dep = this.value;
  let selectEns = document.getElementById("enseignant");

  selectEns.innerHTML = "<option>Chargement...</option>";

  if(dep === ""){
    selectEns.innerHTML = "<option>Choisir enseignant</option>";
    return;
  }

  fetch(WEBAPP + "?action=enseignants&dep=" + encodeURIComponent(dep))

  .then(res => res.json())
  .then(data => {

    selectEns.innerHTML = "<option value=''>Choisir enseignant</option>";

    data.enseignants.forEach(nom => {

      selectEns.innerHTML += `<option value="${nom}">${nom}</option>`;

    });

  })
  .catch(err => {
    selectEns.innerHTML = "<option>Erreur chargement</option>";
    console.log(err);
  });

});


// ===================== GENERER CONVOCATION =====================
function generer(){

  let dep = document.getElementById("dep").value;
  let nom = document.getElementById("enseignant").value;
  let date = document.getElementById("date").value;

  if(dep === "" || nom === "" || date === ""){
    alert("Remplir tous les champs");
    return;
  }

  document.getElementById("loading").style.display = "block";
  document.getElementById("resultat").innerHTML = "";

  fetch(
    WEBAPP +
    "?action=convocation" +
    "&departement=" + encodeURIComponent(dep) +
    "&nom=" + encodeURIComponent(nom) +
    "&date=" + encodeURIComponent(date)
  )

  .then(r => r.json())
  .then(data => {

    document.getElementById("loading").style.display = "none";

    if(data.status === "success"){

      document.getElementById("resultat").innerHTML =
      `<a target="_blank" href="${data.url}">
        📄 Télécharger la Convocation PDF
      </a>`;

    } else {
      alert(data.message);
    }

  })
  .catch(err => {

    document.getElementById("loading").style.display = "none";
    alert("Erreur serveur");
    console.log(err);

  });

}

</script>

</body>
</html>

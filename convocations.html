<!-- ================= CONTENU ================= -->

<div class="container">

<h1>
Génération des Convocations
</h1>

<p>

Choisir le département puis
l’enseignant afin de générer
la convocation officielle PDF.

</p>

<!-- ================= DEPARTEMENT ================= -->

<label>
Département
</label>

<select id="departement">

<option value="">
Choisir département
</option>

</select>

<!-- ================= ENSEIGNANT ================= -->

<label>
Enseignant
</label>

<select id="enseignant">

<option value="">
Choisir enseignant
</option>

</select>

<!-- ================= BOUTON ================= -->

<button onclick="genererConvocation()">

Générer Convocation PDF

</button>

<div id="loading">

Génération du PDF en cours...

</div>

<div id="resultat"></div>

</div>

<!-- ================= FOOTER ================= -->

<footer>
  &copy; 2026 SGH pour Planification et Programmation
</footer>
<!-- ================= SCRIPT ================= -->

<script>

/* =====================================
   🔥 VOTRE WEB APP APPS SCRIPT
===================================== */

const WEBAPP =
"https://script.google.com/macros/s/VOTRE_ID_WEBAPP/exec";


/* =====================================
   🔥 ID GOOGLE DOCS MODELE
===================================== */

const TEMPLATE_ID =
"1tkL8mFaDuslSobrx513PyoRI1rFYmN8-HBpZsKsP908";


/* =====================================
   CHARGER DEPARTEMENTS
===================================== */

fetch(
  WEBAPP + "?action=departements"
)

.then(r => r.json())

.then(data => {

  let selectDep =
    document.getElementById(
      "departement"
    );

  data.departements.forEach(dep => {

    selectDep.innerHTML +=
    `
    <option value="${dep}">
      ${dep}
    </option>
    `;

  });

})

.catch(err => {

  alert(
    "Erreur chargement départements"
  );

});


/* =====================================
   CHARGER ENSEIGNANTS
===================================== */

document
.getElementById("departement")

.addEventListener("change", function(){

  let dep = this.value;

  let selectEns =
    document.getElementById(
      "enseignant"
    );

  selectEns.innerHTML =
  `
  <option value="">
    Chargement...
  </option>
  `;

  fetch(
    WEBAPP +
    "?action=enseignants&dep=" +
    encodeURIComponent(dep)
  )

  .then(r => r.json())

  .then(data => {

    selectEns.innerHTML =
    `
    <option value="">
      Choisir enseignant
    </option>
    `;

    data.enseignants.forEach(nom => {

      selectEns.innerHTML +=
      `
      <option value="${nom}">
        ${nom}
      </option>
      `;

    });

  })

  .catch(err => {

    alert(
      "Erreur chargement enseignants"
    );

  });

});


/* =====================================
   GENERER CONVOCATION
===================================== */

function genererConvocation(){

  let dep =
    document.getElementById(
      "departement"
    ).value;

  let nom =
    document.getElementById(
      "enseignant"
    ).value;

  if(dep === ""){

    alert(
      "Choisir un département"
    );

    return;
  }

  if(nom === ""){

    alert(
      "Choisir un enseignant"
    );

    return;
  }

  document
  .getElementById("loading")
  .style.display = "block";

  document
  .getElementById("resultat")
  .innerHTML = "";

  fetch(

    WEBAPP +

    "?action=convocation" +

    "&dep=" +
    encodeURIComponent(dep) +

    "&nom=" +
    encodeURIComponent(nom)

  )

  .then(r => r.json())

  .then(data => {

    document
    .getElementById("loading")
    .style.display = "none";

    if(data.status === "success"){

      document
      .getElementById("resultat")

      .innerHTML =

      `
      <a href="${data.url}"
      target="_blank">

      Télécharger la Convocation PDF

      </a>
      `;

    }else{

      alert(data.message);

    }

  })

  .catch(err => {

    document
    .getElementById("loading")
    .style.display = "none";

    alert(
      "Erreur serveur"
    );

  });

}

</script>

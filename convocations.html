<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convocations</title>

<style>

body{
  font-family:Arial, sans-serif;
  background:#f4f4f4;
  margin:0;
  padding:0;
}

nav {
  background:#5F9EA0;
  padding:10px;
  position:sticky;
  top:0;
  z-index:1000;
}

nav ul {
  list-style:none;
  display:flex;
  gap:20px;
  margin:0;
  padding:0;
}

nav ul li a {
  color:white;
  text-decoration:none;
  font-weight:bold;
  font-size:18px;
}

nav ul li a:hover {
  text-decoration:underline;
}

.container{
  max-width:600px;
  margin:40px 20px;
  background:white;
  padding:25px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.15);
  text-align:left;
}

h1{
  text-align:center;
  color:#b85400;
  font-size:22px;
}

label{
  font-weight:bold;
  display:block;
  margin-top:15px;
}

select, input, button{
  width:100%;
  padding:12px;
  margin-top:8px;
  font-size:16px;
  border-radius:6px;
  border:1px solid #ccc;
}

button{
  background:#0b7dda;
  color:white;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  background:#095ea8;
}

button:disabled{
  background:gray;
  cursor:not-allowed;
}

#timer{
  margin-top:15px;
  margin-bottom:15px;
  text-align:center;
  font-weight:bold;
  color:#b85400;
  font-size:18px;
}

#loading{
  display:none;
  text-align:center;
  margin-top:15px;
  font-weight:bold;
}

#resultat{
  margin-top:20px;
  text-align:center;
}

#resultat a{
  background:#28a745;
  color:white;
  padding:12px 18px;
  border-radius:6px;
  text-decoration:none;
  display:inline-block;
  font-weight:bold;
}

footer{
  margin-top:40px;
  background:#FF8C00;
  color:white;
  text-align:center;
  padding:15px;
  font-weight:bold;
}

</style>

</head>

<body>

<!-- ===== NAV ===== -->

<nav>
  <ul>
    <li><a href="index.html">Accueil</a></li>
    <li><a href="examens.html">Examens</a></li>
    <li><a href="surveillances.html">Surveillances</a></li>
    <li><a href="convocations.html">Convocations</a></li>
    <li><a href="depots.html">Dépôts</a></li>
    <li><a href="reclamations.html">Réclamations</a></li>
  </ul>
</nav>

<!-- ===== CONTENU ===== -->

<div class="container">

<h1>Génération des Convocations</h1>

<label>Département</label>
<select id="dep">
  <option value="">Choisir département</option>
</select>

<label>Enseignant</label>
<select id="enseignant">
  <option value="">Choisir enseignant</option>
</select>

<label>Jour</label>
<select id="jour">
  <option value="">Choisir jour</option>
</select>

<div id="timer"></div>

<button id="btnPDF" onclick="verifierEtGenererPDF()">
  Générer Convocation PDF
</button>

<div id="loading">
  ⏳ Génération en cours...
</div>

<div id="resultat"></div>

<hr>

</div>

<!-- ===== FOOTER ===== -->

<footer>
  &copy; 2026 SGH pour Planification et Programmation
</footer>

<!-- ===== SCRIPT ===== -->

<script>

let debutPage = Date.now();

setInterval(function(){

   let maintenant = Date.now();

   let reste =
     300 - Math.floor((maintenant - debutPage)/1000);

   if(reste < 0) reste = 0;

   document.getElementById("timer").innerHTML =
     "⏳ Temps restant : " +
     Math.floor(reste/60) + ":" +
     String(reste%60).padStart(2,'0');

   if(reste <= 0){

      document.getElementById("btnPDF").disabled = true;

   }

},1000);


// ===================== VERIFICATION 5 MIN =====================

function verifierEtGenererPDF(){

    let maintenant = Date.now();

    let diffMinutes =
      (maintenant - debutPage) / 1000 / 60;

    if(diffMinutes >= 5){

        alert("Impossible d'avoir une convocation ici");

        return;

    }

    generer();

}


// ===================== WEBAPP =====================

const WEBAPP =
"https://script.google.com/macros/s/AKfycbyZg4xjXxVHMwezbmL3YgdBN-2vudMsaMQ_ScvSV5MsrJn5Mwk6HdRt_wROb2nFk-jc/exec";

let enseignantsData = {};


// ===================== CHARGER DEPARTEMENTS =====================

fetch(WEBAPP)

.then(res => res.json())

.then(data => {

  let selectDep = document.getElementById("dep");

  data.departements.forEach(dep => {

    selectDep.innerHTML +=
      `<option value="${dep.nom}">
        ${dep.nom}
      </option>`;

  });

})

.catch(err => console.log("Erreur départements", err));


// ===================== CHARGER ENSEIGNANTS =====================

document.getElementById("dep")

.addEventListener("change", function(){

  let dep = this.value;

  document.getElementById("enseignant").innerHTML =
    "<option>Chargement...</option>";

  document.getElementById("jour").innerHTML =
    "<option>Choisir jour</option>";

  if(dep === "") return;

  fetch(
    WEBAPP +
    "?action=enseignants&dep=" +
    encodeURIComponent(dep)
  )

  .then(res => res.json())

  .then(data => {

    enseignantsData = data.enseignants || {};

    let ensSelect =
      document.getElementById("enseignant");

    ensSelect.innerHTML =
      "<option value=''>Choisir enseignant</option>";

    for(let nom in enseignantsData){

      ensSelect.innerHTML +=
        `<option value="${nom}">
          ${nom}
        </option>`;

    }

  })

  .catch(err => console.log(err));

});


// ===================== CHARGER JOURS =====================

document.getElementById("enseignant")

.addEventListener("change", function(){

  let nom = this.value;

  let jourSelect =
    document.getElementById("jour");

  jourSelect.innerHTML =
    "<option>Chargement...</option>";

  let jours = enseignantsData[nom] || [];

  jourSelect.innerHTML =
    "<option value=''>Choisir jour</option>";

  jours.forEach(j => {

    jourSelect.innerHTML +=
      `<option value="${j}">
        ${j}
      </option>`;

  });

});


// ===================== GENERER CONVOCATION =====================

function generer(){

  let dep =
    document.getElementById("dep").value;

  let nom =
    document.getElementById("enseignant").value;

  let jour =
    document.getElementById("jour").value;

  if(dep === "" || nom === "" || jour === ""){

    alert("Remplir tous les champs");

    return;
  }

  document.getElementById("loading")
  .style.display = "block";

  fetch(

    WEBAPP +

    "?action=convocation" +

    "&dep=" + encodeURIComponent(dep) +

    "&nom=" + encodeURIComponent(nom) +

    "&date=" + encodeURIComponent(jour) +

    "&debutPage=" + debutPage

  )

  .then(r => r.json())

  .then(data => {

    document.getElementById("loading")
    .style.display = "none";

    if(data.status === "success"){

      const link =
        document.createElement("a");

      link.href =
        "data:application/pdf;base64," +
        data.pdf;

      link.download = data.filename;

      link.click();

      document.getElementById("resultat")
      .innerHTML =
        "✅ Convocation téléchargée";

    } else {

      alert(data.message);

    }

  })

  .catch(err => {

    document.getElementById("loading")
    .style.display = "none";

    alert("Erreur serveur");

    console.log(err);

  });

}

</script>

</body>
</html>

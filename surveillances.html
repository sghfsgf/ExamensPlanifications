<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#7aa1c4">
  <title>Surveillances - SGH Planification</title>
  <style>
    body { font-family: Arial; margin:0; padding:0; background:#f4f4f4; }
    nav { background:#5F9EA0; padding:10px; }
    nav ul { list-style:none; display:flex; gap:20px; margin:0; padding:0; }
    nav ul li a { color:white; font-weight:bold; text-decoration:none; font-size:26px; }
    main { padding:20px; }

    h1, .titre-progression, .titre-tableau { font-size:26px; font-weight:bold; margin-bottom:15px; }
    label { display:block; margin-top:10px; font-weight:bold; font-size:16px; }
    input, select { padding:5px; width:250px; margin-top:5px; font-size:16px; }
    button { margin-top:15px; padding:8px 15px; background:#778899; color:white; border:none; cursor:pointer; font-weight:bold; font-size:16px; border-radius:4px; }
    button:hover { background:#5a6b7a; }
    #message { margin-top:15px; font-weight:bold; font-size:16px; }

    #depProgressContainer { display:none; margin-top:20px; }
    #progressContainer { width:100%; background:#ddd; margin-top:10px; }
    #progressBar { width:0%; height:25px; line-height:25px; color:white; font-weight:bold; text-align:center; transition: width 0.5s, background-color 0.5s; }

    table { width:100%; border-collapse:collapse; margin-top:10px; }
    table, th, td { border:1px solid #888; }
    th, td { padding:8px; text-align:left; }
    th { background:#5F9EA0; color:white; }

    footer { background:#FF8C00; color:white; text-align:center; padding:15px; margin-top:30px; font-weight:bold; }
  </style>
</head>
<body>
<nav>
  <ul>
    <li><a href="index.html">Accueil</a></li>
    <li><a href="examens.html">Examens</a></li>
    <li><a href="surveillances.html">Surveillances</a></li>
    <li><a href="depots.html">Dépôts</a></li>
    <li><a href="reclamations.html">Réclamations</a></li>
  </ul>
</nav>

<main>
  <h1>Inscription à la surveillance</h1>
  <form id="formSurveillance">
    <label>Nom et Prénom</label>
    <input type="text" id="nomPrenom" required>

    <label>Email du chef de département</label>
    <input type="email" id="email" required>

    <label>Département</label>
    <select id="departement" required>
      <option value="">Chargement...</option>
    </select>

    <label>Jour</label>
    <select id="jour" required>
      <option value="">Chargement...</option>
    </select>

    <button type="submit">Envoyer</button>
    <div id="message"></div>
  </form>

  <div id="depProgressContainer">
    <h1 class="titre-progression">Progression du département</h1>
    <div id="progressContainer">
      <div id="progressBar">0%</div>
    </div>

    <h1 class="titre-tableau">Tableau des surveillances</h1>
    <table id="tableDep">
      <thead>
        <tr>
          <th>Date de remplissage</th>
          <th>Nom et Prénom</th>
          <th>Département</th>
          <th>Jour choisi</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</main>

<footer>
  &copy; 2026 SGH pour Planification et Programmation
</footer>

<script>
const form = document.getElementById('formSurveillance');
const messageDiv = document.getElementById('message');
const depProgressContainer = document.getElementById('depProgressContainer');
const progressBar = document.getElementById('progressBar');
const tableBody = document.querySelector("#tableDep tbody");

const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxEbEIG5ThecTmkrcgWHs1ACMzRbc2JuQENqDKSH7F2oxGWAcqtezywGC8DkIvdnMRu/exec';

let departementsData = [];

// Charger départements et jours
fetch(SCRIPT_URL)
.then(res => res.json())
.then(data => {
  departementsData = data.departements;
  const depSelect = document.getElementById('departement');
  depSelect.innerHTML = '<option value="">--Choisir--</option>';
  departementsData.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d.nom;
    opt.textContent = d.nom;
    depSelect.appendChild(opt);
  });

  const jourSelect = document.getElementById('jour');
  jourSelect.innerHTML = '<option value="">--Choisir--</option>';
  data.jours.forEach(j => {
    const opt = document.createElement('option');
    opt.value = j;
    opt.textContent = j;
    jourSelect.appendChild(opt);
  });
});

// Masquer tableau si changement de département
document.getElementById('departement').addEventListener('change', ()=> {
  depProgressContainer.style.display = 'none';
});

// Envoi du formulaire
form.addEventListener('submit', e => {
  e.preventDefault();
  messageDiv.textContent = "Envoi en cours...";
  messageDiv.style.color = "black";

  const formData = new FormData();
  formData.append('nomPrenom', document.getElementById('nomPrenom').value);
  formData.append('email', document.getElementById('email').value);
  formData.append('departement', document.getElementById('departement').value);
  formData.append('jour', document.getElementById('jour').value);
  formData.append('formType','surveillance');

  fetch(SCRIPT_URL, {method:'POST', body: formData})
  .then(res=>res.json())
  .then(data=>{
    messageDiv.style.color = (data.status==='success')?'green':'red';
    messageDiv.textContent = data.message;
    setTimeout(()=>{messageDiv.textContent='';},3000);

    if(data.status==='success'){
      form.reset();
      updateTable(document.getElementById('departement').value);
    }
  })
  .catch(err=>{
    messageDiv.style.color='red';
    messageDiv.textContent='Erreur réseau ou serveur.';
    setTimeout(()=>{messageDiv.textContent='';},3000);
  });
});

// Fonction pour afficher tableau + barre de progression
function updateTable(departement){
  if(!departement) return;
  fetch(SCRIPT_URL+'?departement='+encodeURIComponent(departement))
  .then(res=>res.json())
  .then(data=>{
    const surveillances = data.surveillances || [];
    tableBody.innerHTML='';
    surveillances.forEach(s=>{
      const tr=document.createElement('tr');
      tr.innerHTML=`<td>${new Date(s.date).toLocaleString()}</td><td>${s.nomPrenom}</td><td>${s.departement}</td><td>${s.jour}</td>`;
      tableBody.appendChild(tr);
    });

    // Barre de progression
    const depInfo = departementsData.find(d=>d.nom===departement);
    const total = depInfo?depInfo.nbEnseignants:1;
    const pct = Math.min(100, Math.round((surveillances.length/total)*100));
    progressBar.style.width=pct+'%';
    progressBar.textContent=pct+'%';
    if(pct<50){progressBar.style.background="#f44336";}
    else if(pct<80){progressBar.style.background="#ff9800";}
    else if(pct<100){progressBar.style.background="#2196F3";}
    else{progressBar.style.background="#4CAF50";}

    depProgressContainer.style.display='block';
  });
}

// Service Worker
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js')
  .then(()=>console.log('Service Worker enregistré !'))
  .catch(err=>console.log('Erreur Service Worker :',err));
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Surveillances - SGH Planification</title>

  <style>
    body { font-family: Arial; margin:0; padding:0; background:#f4f4f4; }

    nav { background:#5F9EA0; padding:10px; }
    nav ul { list-style:none; display:flex; gap:20px; margin:0; padding:0; }
    nav ul li a { color:white; font-weight:bold; text-decoration:none; font-size:26px; }

    main { padding:20px; }

    label { display:block; margin-top:10px; font-weight:bold; }
    input, select { padding:5px; width:300px; margin-top:5px; }

    button {
      margin-top:15px;
      padding:8px 15px;
      background:#778899;
      color:white;
      border:none;
      cursor:pointer;
      border-radius:4px;
    }

    button:hover { background:#5a6b7a; }

    #message { margin-top:15px; font-weight:bold; }

    #progressContainer { display:none; margin-top:20px; }
    #progressBar {
      width:0%;
      height:25px;
      color:white;
      text-align:center;
      line-height:25px;
      border-radius:4px;
    }

    table {
      width:100%;
      border-collapse: collapse;
      margin-top:20px;
      display:none;
    }

    table, th, td { border:1px solid #888; }
    th, td { padding:8px; }

    footer {
      background:#FF8C00;
      color:white;
      text-align:center;
      padding:15px;
      margin-top:30px;
    }
  </style>
</head>

<body>

<nav>
  <ul>
    <li><a href="index.html">Accueil</a></li>
    <li><a href="examens.html">Examens</a></li>
    <li><a href="surveillances.html">Surveillances</a></li>
  </ul>
</nav>

<main>

<h1>Inscription à la surveillance</h1>

<form id="formSurveillance">

  <label>Email</label>
  <input type="email" id="email" required>

  <label>Département</label>
  <select id="departement">
    <option>Chargement...</option>
  </select>

  <label>Nom (arabe)</label>
  <input type="text" id="nomPrenom" required>

  <label>Jour</label>
  <select id="jour">
    <option>Chargement...</option>
  </select>

  <button type="submit">Envoyer</button>

  <div id="message"></div>

</form>

<!-- RESULTATS -->

<div id="progressContainer">
  <div id="progressBar">0%</div>
  <div id="restant"></div>
</div>

<table id="tableDep">
  <thead>
    <tr>
      <th>Date</th>
      <th>Nom</th>
      <th>Département</th>
      <th>Jour</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

</main>

<footer>
  SGH 2026
</footer>

<script>

const SCRIPT_URL = "TON_URL_APPS_SCRIPT_ICI";

const depSelect = document.getElementById('departement');
const jourSelect = document.getElementById('jour');
const form = document.getElementById('formSurveillance');
const messageDiv = document.getElementById('message');

const table = document.getElementById('tableDep');
const tbody = table.querySelector('tbody');

const progressBar = document.getElementById('progressBar');
const progressContainer = document.getElementById('progressContainer');
const restantDiv = document.getElementById('restant');

// ==========================
// 🔹 CHARGEMENT INITIAL
// ==========================

fetch(SCRIPT_URL)
.then(res => res.json())
.then(data => {

  depSelect.innerHTML = '<option value="">--Choisir--</option>';
  (data.departements || []).forEach(d => {
    depSelect.innerHTML += `<option value="${d.nom}">${d.nom}</option>`;
  });

  jourSelect.innerHTML = '<option value="">--Choisir--</option>';
  (data.jours || []).forEach(j => {
    jourSelect.innerHTML += `<option value="${j}">${j}</option>`;
  });

})
.catch(() => {
  depSelect.innerHTML = '<option>Erreur</option>';
  jourSelect.innerHTML = '<option>Erreur</option>';
});

// ==========================
// 🔹 ENVOI FORMULAIRE
// ==========================

form.addEventListener('submit', e => {
  e.preventDefault();

  const formData = new FormData();
  formData.append("nomPrenom", document.getElementById('nomPrenom').value);
  formData.append("email", document.getElementById('email').value);
  formData.append("departement", depSelect.value);
  formData.append("jour", jourSelect.value);

  fetch(SCRIPT_URL, { method:'POST', body:formData })
  .then(res => res.json())
  .then(data => {

    messageDiv.textContent = data.message;

    if(data.status === "success"){
      afficherTableau(depSelect.value);
    }

  });

});

// ==========================
// 🔹 AFFICHAGE TABLEAU
// ==========================

function afficherTableau(dep){

  fetch(SCRIPT_URL + "?departement=" + dep)
  .then(res => res.json())
  .then(data => {

    tbody.innerHTML = "";

    (data.surveillances || []).forEach(s => {
      tbody.innerHTML += `
        <tr>
          <td>${new Date(s.date).toLocaleString()}</td>
          <td>${s.nom}</td>
          <td>${s.departement}</td>
          <td>${s.jour}</td>
        </tr>`;
    });

    table.style.display = "table";

    const total = 10;
    const inscrits = data.surveillances.length;
    const pct = Math.round((inscrits / total) * 100);

    progressBar.style.width = pct + "%";
    progressBar.textContent = pct + "%";

    restantDiv.textContent = "Restant : " + (total - inscrits);

    progressContainer.style.display = "block";

  });

}

</script>

</body>
</html>

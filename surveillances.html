<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Surveillances - SGH Planification</title>

  <style>
    body { font-family: Arial; margin:0; padding:0; background:#f4f4f4; }
    nav { background:#5F9EA0; padding:10px; }
    nav ul { list-style:none; display:flex; gap:20px; margin:0; padding:0; }
    nav ul li a { color:white; font-weight:bold; text-decoration:none; font-size:26px; }
    main { padding:20px; }

    h1 { font-size:18px; font-weight:bold; margin-bottom:15px; }

    label { display:block; margin-top:10px; font-weight:bold; font-size:16px; }
    input, select {
      padding:5px;
      width:300px;
      margin-top:5px;
      font-size:16px;
    }

    button {
      margin-top:15px;
      padding:8px 15px;
      background:#778899;
      color:white;
      border:none;
      cursor:pointer;
      font-weight:bold;
      font-size:16px;
      border-radius:4px;
    }

    button:hover { background:#5a6b7a; }

    #message { margin-top:15px; font-weight:bold; font-size:14px; }

    #progressContainer {
      width:100%;
      background:#ddd;
      margin-top:10px;
      display:none;
      padding:10px;
      border-radius:4px;
    }

    #progressBar {
      width:0%;
      height:25px;
      text-align:center;
      color:white;
      line-height:25px;
      font-weight:bold;
      transition: width 0.5s ease;
      border-radius:4px;
    }

    table {
      width:100%;
      border-collapse: collapse;
      margin-top:10px;
      display:none;
    }

    table, th, td { border:1px solid #888; }
    th, td { padding:8px; text-align:left; }

    footer {
      background:#FF8C00;
      color:white;
      text-align:center;
      padding:15px;
      margin-top:30px;
      font-weight:bold;
    }
  </style>
</head>

<body>

<nav>
  <ul>
    <li><a href="index.html">Accueil</a></li>
    <li><a href="examens.html">Examens</a></li>
    <li><a href="surveillances.html">Surveillances</a></li>
    <li><a href="depots.html">Dépôts</a></li>
    <li><a href="reclamations.html">Réclamations</a></li>
  </ul>
</nav>

<main>

<h1>Inscription à la surveillance</h1>

<form id="formSurveillance">

  <label>Email</label>
  <input type="email" id="email" required>

  <label>Département</label>
  <select id="departement">
    <option>Chargement...</option>
  </select>

  <label>Nom (arabe)</label>
  <input type="text" id="nomPrenom" oninput="verifierArabe()">
  <p id="erreurNom" style="color:red;"></p>

  <label>Jour</label>
  <select id="jour">
    <option>Chargement...</option>
  </select>

  <button type="submit">Envoyer</button>

</form>

<div id="message"></div>

<div id="progressContainer">
  <div id="progressBar">0%</div>
</div>

<table id="tableDep">
  <thead>
    <tr>
      <th>Date</th>
      <th>Nom</th>
      <th>Département</th>
      <th>Jour</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

</main>

<footer>
  &copy; 2026 SGH
</footer>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyZg4xjXxVHMwezbmL3YgdBN-2vudMsaMQ_ScvSV5MsrJn5Mwk6HdRt_wROb2nFk-jc/exec";

const depSelect = document.getElementById("departement");
const jourSelect = document.getElementById("jour");
const emailInput = document.getElementById("email");
const messageDiv = document.getElementById("message");

const table = document.getElementById("tableDep");
const tbody = table.querySelector("tbody");

const progressContainer = document.getElementById("progressContainer");
const progressBar = document.getElementById("progressBar");

let timer;

// ============================
// 🔹 CHARGEMENT INITIAL
// ============================
fetch(SCRIPT_URL)
.then(r => r.json())
.then(data => {

  const deps = data.departements || [];
  const jours = data.jours || [];

  depSelect.innerHTML = '<option value="">--Choisir--</option>';
  deps.forEach(d => {
    if(d?.nom) depSelect.innerHTML += `<option value="${d.nom}">${d.nom}</option>`;
  });

  jourSelect.innerHTML = '<option value="">--Choisir--</option>';
  jours.forEach(j => {
    if(j) jourSelect.innerHTML += `<option value="${j}">${j}</option>`;
  });

})
.catch(err => {
  console.log(err);
  depSelect.innerHTML = "<option>Erreur chargement</option>";
  jourSelect.innerHTML = "<option>Erreur chargement</option>";
});

// ============================
// 🔹 AUTO AFFICHAGE
// ============================
depSelect.addEventListener("change", trigger);
emailInput.addEventListener("blur", trigger);

function trigger(){
  clearTimeout(timer);

  timer = setTimeout(() => {
    if(depSelect.value && emailInput.value.includes("@")){
      afficher(depSelect.value);
    }
  }, 300);
}

// ============================
// 🔹 AFFICHAGE TABLE
// ============================
function afficher(dep){

  const email = emailInput.value.trim();
  if(!email) return;

  fetch(SCRIPT_URL + "?departement=" + dep + "&email=" + email)
  .then(r => r.json())
  .then(data => {

    tbody.innerHTML = "";
    table.style.display = "table";
    progressContainer.style.display = "block";

    if(data.status === "error"){
      messageDiv.innerHTML = "❌ accès refusé";
      return;
    }

    const list = data.surveillances || [];

    if(list.length === 0){
      tbody.innerHTML = "<tr><td colspan='4'>Aucune donnée</td></tr>";
      return;
    }

    list.forEach(s => {
      tbody.innerHTML += `
        <tr>
          <td>${new Date(s.date).toLocaleString()}</td>
          <td>${s.nom}</td>
          <td>${s.departement}</td>
          <td>${s.jour}</td>
        </tr>`;
    });

    progressBar.style.width = "100%";
    progressBar.textContent = list.length;

  })
  .catch(err => {
    console.log(err);
    messageDiv.innerHTML = "Erreur serveur";
  });
}

// ============================
// 🔹 ARABE
// ============================
function verifierArabe(){
  const input = document.getElementById("nomPrenom");
  const err = document.getElementById("erreurNom");

  if(!/^[\u0600-\u06FF\s]*$/.test(input.value)){
    err.innerHTML = "Arabe uniquement";
  } else {
    err.innerHTML = "";
  }
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#7aa1c4"> 
  <meta charset="UTF-8">
  <title>Surveillances - SGH Planification</title>
  <style>
    body { font-family: Arial, sans-serif; margin:0; padding:0; background:#f4f4f4; }
    nav { background:#5F9EA0; padding:10px; }
    nav ul { list-style:none; display:flex; gap:20px; margin:0; padding:0; }
    nav ul li a { color:white; font-weight:bold; text-decoration:none; font-size:26px; }
    main { padding:20px; }

    /* 🔹 Taille uniforme des titres principaux */
    h1, .titre-tableau, .titre-progression {
      font-size:26px;
      font-weight:bold;
      margin-bottom:20px;
    }

    label { display:block; margin-top:10px; font-weight:bold; }
    input, select { padding:5px; width:250px; margin-top:5px; }
    button { margin-top:15px; padding:8px 15px; background:#778899; color:white; border:none; cursor:pointer; font-weight:bold; }
    button:hover { background:#5a6b7a; }
    #message { margin-top:15px; font-weight:bold; }
    
    /* Barre de progression */
    #progressContainer { width:100%; background:#ddd; margin-top:20px; }
    #progressBar { width:0%; height:25px; background:#4CAF50; text-align:center; color:white; line-height:25px; font-weight:bold; }

    table { width:100%; border-collapse:collapse; margin-top:15px; }
    th, td { border:1px solid #888; padding:8px; text-align:left; }
    th { background:#5F9EA0; color:white; }

    footer { background:#FF8C00; color:white; text-align:center; padding:15px; margin-top:30px; font-weight:bold; }
  </style>
</head>
<body>

<nav>
  <ul>
    <li><a href="index.html">Accueil</a></li>
    <li><a href="examens.html">Examens</a></li>
    <li><a href="surveillances.html">Surveillances</a></li>
    <li><a href="depots.html">Dépôts</a></li>
    <li><a href="reclamations.html">Réclamations</a></li>
  </ul>
</nav>

<main>
  <h1>Inscription à la surveillance</h1>
  <form id="formSurveillance">
    <label>Nom et Prénom</label>
    <input type="text" id="nomPrenom" required>

    <label>Email du chef de département</label>
    <input type="email" id="email" required>

    <label>Département</label>
    <select id="departement" required>
      <option value="">Chargement...</option>
    </select>

    <label>Jour</label>
    <select id="jour" required>
      <option value="">Chargement...</option>
    </select>

    <button type="submit">Envoyer</button>
    <div id="message"></div>
  </form>

  <!-- Barre de progression -->
  <h1 class="titre-progression">Progression du département</h1>
  <div id="progressContainer"><div id="progressBar">0%</div></div>

  <!-- Tableau des surveillances -->
  <h1 class="titre-tableau">Tableau des surveillances</h1>
  <table id="tableSurveillances">
    <thead>
      <tr>
        <th>Date</th>
        <th>Nom de l’enseignant</th>
        <th>Jour choisi</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</main>

<footer>
  &copy; 2026 SGH pour Planification et Programmation
</footer>

<script>
const form = document.getElementById('formSurveillance');
const messageDiv = document.getElementById('message');
const progressBar = document.getElementById('progressBar');
const tableBody = document.querySelector("#tableSurveillances tbody");

// URL Apps Script
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyhhgYnxxmvBorT_HDlFKpyyu0IdWJ-PQZFM0TdCLk4USEro1utDQ0Y6NNF4p92pPY4/exec';

// Charger dynamiquement départements et jours
fetch(SCRIPT_URL)
  .then(res => res.json())
  .then(data => {
    const depSelect = document.getElementById('departement');
    depSelect.innerHTML = '<option value="">--Choisir--</option>';
    data.departements.forEach(dep => {
      const opt = document.createElement('option');
      opt.value = dep.nom;
      opt.textContent = dep.nom;
      depSelect.appendChild(opt);
    });

    const jourSelect = document.getElementById('jour');
    jourSelect.innerHTML = '<option value="">--Choisir--</option>';
    data.jours.forEach(j => {
      const opt = document.createElement('option');
      opt.value = j;
      opt.textContent = j;
      jourSelect.appendChild(opt);
    });
  })
  .catch(err => {
    console.error("Erreur chargement départements/jours :", err);
    messageDiv.style.color = 'red';
    messageDiv.textContent = "Impossible de charger les départements et jours.";
    setTimeout(() => { messageDiv.textContent = ""; }, 3000);
  });

// Fonction pour afficher tableau et progression
function updateTable(departement) {
  if(!departement) return;
  fetch(SCRIPT_URL + "?departement=" + encodeURIComponent(departement))
    .then(res => res.json())
    .then(data => {
      // Vider tableau
      tableBody.innerHTML = "";
      let nbRemplis = 0;
      data.surveillances.forEach(item => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${new Date(item.date).toLocaleString()}</td><td>${item.nom}</td><td>${item.jour}</td>`;
        tableBody.appendChild(tr);
        nbRemplis++;
      });

      // Mettre à jour barre de progression
      fetch(SCRIPT_URL)
        .then(res => res.json())
        .then(depData => {
          const depInfo = depData.departements.find(d => d.nom === departement);
          const total = depInfo ? depInfo.nbEnseignants : 1;
          const pct = Math.min(100, Math.round((nbRemplis / total) * 100));
          progressBar.style.width = pct + "%";
          progressBar.textContent = pct + "%";
        });
    });
}

// Afficher tableau à chaque changement de département
document.getElementById('departement').addEventListener('change', function() {
  updateTable(this.value);
});

// Envoi du formulaire
form.addEventListener('submit', e => {
  e.preventDefault();
  messageDiv.textContent = "Envoi en cours...";
  messageDiv.style.color = "black";

  const formData = new FormData();
  formData.append('nomPrenom', document.getElementById('nomPrenom').value);
  formData.append('email', document.getElementById('email').value);
  formData.append('departement', document.getElementById('departement').value);
  formData.append('jour', document.getElementById('jour').value);
  formData.append('formType', 'surveillance');

  fetch(SCRIPT_URL, { method: 'POST', body: formData })
    .then(res => res.json())
    .then(data => {
      messageDiv.style.color = (data.status === 'success') ? 'green' : 'red';
      messageDiv.textContent = data.message;

      setTimeout(() => { messageDiv.textContent = ""; }, 3000);
      if(data.status === 'success') {
        form.reset();
        updateTable(document.getElementById('departement').value);
      }
    })
    .catch(err => {
      messageDiv.style.color = 'red';
      messageDiv.textContent = 'Erreur réseau ou serveur.';
      setTimeout(() => { messageDiv.textContent = ""; }, 3000);
    });
});

// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js')
    .then(() => console.log('Service Worker enregistré !'))
    .catch(err => console.log('Erreur Service Worker :', err));
}
</script>

</body>
</html>

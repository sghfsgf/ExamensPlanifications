<main>

<h1>Session Principale mai 2026: Inscription à la surveillance</h1>

<form id="formSurveillance">

  <label>Nom et Prenom (arabe)</label>
  <input type="text" id="nomPrenom" required pattern="[\u0600-\u06FF\s]+" oninput="verifierArabe()">
  <p id="erreurNom" style="color:red;"></p>

  <label>Email</label>
  <input type="email" id="email" required>

  <label>Département</label>
  <select id="departement">
    <option>Chargement...</option>
  </select>

  <label>Jour</label>
  <select id="jour">
    <option>Chargement...</option>
  </select>

  <button type="submit">Envoyer</button>

  <div id="message"></div>

</form>

<div id="resultats">

  <div id="progressContainer">
    <div id="progressBar">0%</div>
    <div id="restant"></div>
  </div>

  <table id="tableDep">
    <thead>
      <tr>
        <th>Date</th>
        <th>Nom</th>
        <th>Département</th>
        <th>Jour</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

</div>

</main>

<footer>SGH 2026</footer>

<script>

const SCRIPT_URL = "TON_URL";

const depSelect = document.getElementById('departement');
const jourSelect = document.getElementById('jour');
const form = document.getElementById('formSurveillance');
const messageDiv = document.getElementById('message');
const table = document.getElementById('tableDep');
const tbody = table.querySelector('tbody');

const progressBar = document.getElementById('progressBar');
const progressContainer = document.getElementById('progressContainer');
const restantDiv = document.getElementById('restant');

// 🔹 Charger données
fetch(SCRIPT_URL)
.then(res => res.json())
.then(data => {

  depSelect.innerHTML = '<option value="">--Choisir--</option>';
  (data.departements || []).forEach(d => {
    depSelect.innerHTML += `<option value="${d.nom}">${d.nom}</option>`;
  });

  jourSelect.innerHTML = '<option value="">--Choisir--</option>';
  (data.jours || []).forEach(j => {
    jourSelect.innerHTML += `<option value="${j}">${j}</option>`;
  });

});

// 🔹 Envoi formulaire
form.addEventListener('submit', e => {
  e.preventDefault();

  const formData = new FormData();
  formData.append("nomPrenom", document.getElementById('nomPrenom').value);
  formData.append("email", document.getElementById('email').value);
  formData.append("departement", depSelect.value);
  formData.append("jour", jourSelect.value);

  fetch(SCRIPT_URL, { method:'POST', body:formData })
  .then(res => res.json())
  .then(data => {

    messageDiv.textContent = data.message;

    if(data.status === "success"){
      afficherTableau(depSelect.value);
    }

  });

});

// 🔹 Tableau
function afficherTableau(dep){

  fetch(SCRIPT_URL + "?departement=" + dep)
  .then(res => res.json())
  .then(data => {

    tbody.innerHTML = "";

    (data.surveillances || []).forEach(s => {
      tbody.innerHTML += `
        <tr>
          <td>${new Date(s.date).toLocaleString()}</td>
          <td>${s.nom}</td>
          <td>${s.departement}</td>
          <td>${s.jour}</td>
        </tr>`;
    });

    table.style.display = "table";

    const total = 10;
    const inscrits = data.surveillances.length;
    const pct = Math.round((inscrits / total) * 100);

    progressBar.style.width = pct + "%";
    progressBar.textContent = pct + "%";

    restantDiv.textContent = "Restant : " + (total - inscrits);

    progressContainer.style.display = "block";

  });

}

// 🔹 Validation arabe
function verifierArabe(){
  const input = document.getElementById("nomPrenom");
  const erreur = document.getElementById("erreurNom");

  const regex = /^[\u0600-\u06FF\s]+$/;

  erreur.textContent = regex.test(input.value) ? "" : "⚠️ arabe uniquement";
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Surveillances - SGH Planification</title>
  <style>
    body { font-family: Arial; margin:0; padding:0; background:#f4f4f4; }
    nav { background:#5F9EA0; padding:10px; }
    nav ul { list-style:none; display:flex; gap:20px; margin:0; padding:0; }
    nav ul li a { color:white; font-weight:bold; text-decoration:none; font-size:26px; }
    main { padding:20px; }
    h1, .titre-tableau, .titre-progression { font-size:18px; font-weight:bold; margin-bottom:15px; }

    label { display:block; margin-top:10px; font-weight:bold; font-size:16px; }
    input, select { padding:5px; width:250px; margin-top:5px; font-size:16px; }
    button { margin-top:15px; padding:8px 15px; background:#778899; color:white; border:none; cursor:pointer; font-weight:bold; font-size:16px; border-radius:4px; }
    button:hover { background:#5a6b7a; }
    #message { margin-top:15px; font-weight:bold; font-size:14px; }

    /* Barre de progression */
    #progressContainer { width:100%; background:#ddd; margin-top:10px; display:none; padding:10px; border-radius:4px; }
    #progressBar { width:0%; height:25px; text-align:center; color:white; line-height:25px; font-weight:bold; transition: width 0.5s ease, background-color 0.5s ease; border-radius:4px; }
    #restant { margin-top:5px; font-weight:bold; }

    table { width:100%; border-collapse: collapse; margin-top:10px; display:none; }
    table, th, td { border:1px solid #888; }
    th, td { padding:8px; text-align:left; }

    #exportBtn { background:#4CAF50; margin-top:10px; }
    #exportBtn:hover { background:#45a049; }

    footer { background:#FF8C00; color:white; text-align:center; padding:15px; margin-top:30px; font-weight:bold; }
  </style>
</head>
<body>

<nav>
  <ul>
    <li><a href="index.html">Accueil</a></li>
    <li><a href="examens.html">Examens</a></li>
    <li><a href="surveillances.html">Surveillances</a></li>
    <li><a href="depots.html">Dépôts</a></li>
    <li><a href="reclamations.html">Réclamations</a></li>
  </ul>
</nav>

<main>
  <h1>Inscription à la surveillance</h1>

  <form id="formSurveillance">
    <label for="nomPrenom">
Nom et Prenom:Prière de remplir en arabe chaque
</label>

<input type="text"
       id="nomPrenom"
       required
       pattern="[\u0600-\u06FF\s]+"
       title="Veuillez écrire uniquement en arabe"
       oninput="verifierArabe()">

<p id="erreurNom" style="color:red; font-size:14px;"></p>

    <label>Email du chef de département</label>
    <input type="email" id="email" required>

    <label>Département</label>
    <select id="departement" required>
      <option value="">Chargement...</option>
    </select>

    <label>Jour</label>
    <select id="jour" required>
      <option value="">Chargement...</option>
    </select>

    <button type="submit">Envoyer</button>
    <div id="message"></div>
  </form>

  <!-- 🔻 RESULTATS EN BAS -->
  <div id="resultats" style="margin-top:40px;">

    <div id="progressContainer">
      <h1 class="titre-progression">Progression du département</h1>
      <div id="progressBar">0%</div>
      <div id="restant"></div>
    </div>

    <table id="tableDep">
      <thead>
        <tr>
          <th>Date</th>
          <th>Nom</th>
          <th>Département</th>
          <th>Jour</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <button id="exportBtn">Exporter Excel</button>

  </div>
</main>

<footer>
  &copy; 2026 SGH pour Planification et Programmation
</footer>

<script>

  const form = document.getElementById('formSurveillance');
const messageDiv = document.getElementById('message');
const depSelect = document.getElementById('departement');
const jourSelect = document.getElementById('jour');
const emailInput = document.getElementById('email'); 
const progressContainer = document.getElementById('progressContainer');
const progressBar = document.getElementById('progressBar');
const restantDiv = document.getElementById('restant');

const tableDep = document.getElementById('tableDep');
const tbody = tableDep.querySelector('tbody');
const exportBtn = document.getElementById('exportBtn');

const resultats = document.getElementById('resultats');

const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyZg4xjXxVHMwezbmL3YgdBN-2vudMsaMQ_ScvSV5MsrJn5Mwk6HdRt_wROb2nFk-jc/exec';


// 🔹 Charger données initiales
fetch(SCRIPT_URL)
.then(res => res.json())
.then(data => {

  depSelect.innerHTML = '<option value="">--Choisir--</option>';
  data.departements.forEach(d => {
    depSelect.innerHTML += `<option value="${d.nom}">${d.nom}</option>`;
  });

  jourSelect.innerHTML = '<option value="">--Choisir--</option>';
  data.jours.forEach(j => {
    jourSelect.innerHTML += `<option value="${j}">${j}</option>`;
  });

});

// 🔥 PARTIE 3 ICI
emailInput.addEventListener('input', verifierEtAfficher);
depSelect.addEventListener('change', verifierEtAfficher);


// 🔹 Envoi formulaire
form.addEventListener('submit', e => {
  e.preventDefault();

  if(!depSelect.value || !jourSelect.value){
    messageDiv.textContent = "Veuillez remplir tous les champs";
    messageDiv.style.color = "red";
    return;
  }

  messageDiv.textContent = "Envoi en cours...";
  messageDiv.style.color = "black";

  const depChoisi = depSelect.value;

  const formData = new FormData();
  formData.append('formType','surveillance');
  formData.append('nomPrenom', document.getElementById('nomPrenom').value);
  formData.append('email', document.getElementById('email').value);
  formData.append('departement', depChoisi);
  formData.append('jour', jourSelect.value);

  fetch(SCRIPT_URL, { method:'POST', body: formData })
  .then(res => res.json())
  .then(data => {

    messageDiv.style.color = data.status === 'success' ? 'green' : 'red';
    messageDiv.textContent = data.message;

    if(data.status === 'success'){

      // ⚠️ reset intelligent (garde département)
      document.getElementById('nomPrenom').value = "";
      document.getElementById('email').value = "";
      jourSelect.value = "";

      afficherTableau(depChoisi);

      // 🔻 Scroll vers résultats
      resultats.scrollIntoView({ behavior: "smooth" });

    }

  })
  .catch(() => {
    messageDiv.textContent = "Erreur serveur";
    messageDiv.style.color = "red";
  });

});
function verifierEtAfficher(){

  const email = emailInput.value.trim();
  const dep = depSelect.value;

  if(!email || !dep){
    return;
  }

  afficherTableau(dep);

  resultats.scrollIntoView({ behavior: "smooth" });
}

// 🔹 Affichage tableau
function afficherTableau(departement){

  if(!departement) return;

  console.log("Département :", departement);

  // 🔥 afficher immédiatement
  progressContainer.style.display = "block";
  tableDep.style.display = "table";
  exportBtn.style.display = "inline-block";

  fetch(SCRIPT_URL + '?departement=' + encodeURIComponent(departement))
  .then(res => res.json())
  .then(data => {

    console.log("Réponse :", data);

    tbody.innerHTML = "";

    if(!data.surveillances || data.surveillances.length === 0){
      tbody.innerHTML = "<tr><td colspan='4'>Aucune donnée disponible</td></tr>";
      return;
    }

    data.surveillances.forEach(s => {
      tbody.innerHTML += `
        <tr>
          <td>${new Date(s.date).toLocaleString()}</td>
          <td>${s.nom}</td>
          <td>${s.departement}</td>
          <td>${s.jour}</td>
        </tr>`;
    });
fetch(SCRIPT_URL)
.then(res => res.json())
.then(depData => {

  const depInfo = depData.departements.find(d =>
    d.nom.trim().toLowerCase() === departement.trim().toLowerCase()
  );

  const total = (depInfo && depInfo.nbEnseignants > 0)
    ? depInfo.nbEnseignants
    : 1;

  const inscrits = data.surveillances ? data.surveillances.length : 0;

  const pct = Math.min(100, Math.round((inscrits / total) * 100));

  // 🔥 afficher barre
  progressContainer.style.display = "block";
  progressBar.style.width = pct + "%";
  progressBar.textContent = pct + "%";

  // 🎨 couleur
  if (pct < 50) {
    progressBar.style.background = "#f44336";
  } else if (pct < 80) {
    progressBar.style.background = "#ff9800";
  } else if (pct < 100) {
    progressBar.style.background = "#2196F3";
  } else {
    progressBar.style.background = "#4CAF50";
  }

  const restant = total - inscrits;

  if (restant <= 0) {
    restantDiv.textContent = "✅ Département complet";
    restantDiv.style.color = "green";
  } else {
    restantDiv.textContent = "Enseignants restants : " + restant;
    restantDiv.style.color = "black";
  }

});
  })
  .catch(() => {
    tbody.innerHTML = "<tr><td colspan='4'>Erreur de chargement</td></tr>";
  });

}


// 🔹 Export Excel
exportBtn.onclick = function(){

  const dep = depSelect.value;

  if(!dep){
    alert("Choisir un département");
    return;
  }

  fetch(SCRIPT_URL + "?export=excel&departement=" + encodeURIComponent(dep))
.then(res => res.json())
.then(data => {
  if(data.status === "success"){
    window.open(data.url, "_blank");
  } else {
    alert("Erreur export");
  }
});

};
  function verifierArabe() {
  const input = document.getElementById("nomPrenom");
  const erreur = document.getElementById("erreurNom");

  const regex = /^[\u0600-\u06FF\s]+$/;

  if (!regex.test(input.value)) {
    erreur.textContent = "⚠️ Veuillez écrire en arabe uniquement";
  } else {
    erreur.textContent = "";
  }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Surveillances - SGH Planification</title>

  <style>
    body { font-family: Arial; margin:0; padding:0; background:#f4f4f4; }
    nav { background:#5F9EA0; padding:10px; }
    nav ul { list-style:none; display:flex; gap:20px; margin:0; padding:0; }
    nav ul li a { color:white; font-weight:bold; text-decoration:none; font-size:26px; }
    main { padding:20px; }

    h1 { font-size:18px; font-weight:bold; margin-bottom:15px; }

    label { display:block; margin-top:10px; font-weight:bold; font-size:16px; }
    input, select { padding:5px; width:300px; margin-top:5px; font-size:16px; }

    button {
      margin-top:15px;
      padding:8px 15px;
      background:#778899;
      color:white;
      border:none;
      cursor:pointer;
      font-weight:bold;
      font-size:16px;
      border-radius:4px;
    }

    button:hover { background:#5a6b7a; }

    #message { margin-top:15px; font-weight:bold; font-size:14px; }

    #progressContainer {
      width:100%;
      background:#ddd;
      margin-top:10px;
      display:none;
      padding:10px;
      border-radius:4px;
    }

    #progressBar {
      width:0%;
      height:25px;
      text-align:center;
      color:white;
      line-height:25px;
      font-weight:bold;
      transition: width 0.5s ease, background-color 0.5s ease;
      border-radius:4px;
    }

    #restant { margin-top:5px; font-weight:bold; }

    table {
      width:100%;
      border-collapse: collapse;
      margin-top:10px;
      display:none;
    }

    table, th, td { border:1px solid #888; }
    th, td { padding:8px; text-align:left; }

    footer {
      background:#FF8C00;
      color:white;
      text-align:center;
      padding:15px;
      margin-top:30px;
      font-weight:bold;
    }
  </style>
</head>

<body>

<nav>
  <ul>
    <li><a href="index.html">Accueil</a></li>
    <li><a href="examens.html">Examens</a></li>
    <li><a href="surveillances.html">Surveillances</a></li>
    <li><a href="depots.html">Dépôts</a></li>
    <li><a href="reclamations.html">Réclamations</a></li>
  </ul>
</nav>

<main>

<h1>Session Principale mai 2026</h1>

<form id="formSurveillance">

  <label>Email du chef de département</label>
  <input type="email" id="email" required>

  <label>Département</label>
  <select id="departement" required>
    <option value="">Chargement...</option>
  </select>

  <label>Nom et Prenom (arabe)</label>
  <input type="text" id="nomPrenom" required oninput="verifierArabe()">

  <label>Jour</label>
  <select id="jour" required>
    <option value="">Chargement...</option>
  </select>

  <button type="submit">Envoyer</button>

  <div id="message"></div>

</form>

<div id="progressContainer">
  <h3>Progression du département</h3>
  <div id="progressBar">0%</div>
  <div id="restant"></div>
</div>

<table id="tableDep">
  <thead>
    <tr>
      <th>Date</th>
      <th>Nom</th>
      <th>Département</th>
      <th>Jour</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

</main>

<footer>
  &copy; 2026 SGH
</footer>

<script>

const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyZg4xjXxVHMwezbmL3YgdBN-2vudMsaMQ_ScvSV5MsrJn5Mwk6HdRt_wROb2nFk-jc/exec';

const emailInput = document.getElementById("email");
const depSelect = document.getElementById("departement");
const jourSelect = document.getElementById("jour");
const messageDiv = document.getElementById("message");
const progressBar = document.getElementById("progressBar");
const progressContainer = document.getElementById("progressContainer");
const restantDiv = document.getElementById("restant");
const tableDep = document.getElementById("tableDep");
const tbody = tableDep.querySelector("tbody");

/* =========================
   🔹 CHARGEMENT DATA FIX
========================= */
fetch(SCRIPT_URL)
.then(res => res.json())
.then(data => {

  const deps = data.departements || [];
  const jours = data.jours || [];

  depSelect.innerHTML = '<option value="">--Choisir--</option>';
  deps.forEach(d => {
    depSelect.innerHTML += `<option value="${d.nom}">${d.nom}</option>`;
  });

  jourSelect.innerHTML = '<option value="">--Choisir--</option>';
  jours.forEach(j => {
    jourSelect.innerHTML += `<option value="${j}">${j}</option>`;
  });

})
.catch(() => {
  depSelect.innerHTML = "<option>Erreur</option>";
  jourSelect.innerHTML = "<option>Erreur</option>";
});

/* =========================
   🔹 FORM SUBMIT
========================= */
document.getElementById("formSurveillance").addEventListener("submit", e => {
  e.preventDefault();

  messageDiv.textContent = "Envoi en cours...";
  messageDiv.style.color = "black";

  const formData = new FormData();
  formData.append("email", emailInput.value);
  formData.append("departement", depSelect.value);
  formData.append("nomPrenom", document.getElementById("nomPrenom").value);
  formData.append("jour", jourSelect.value);

  fetch(SCRIPT_URL, { method:"POST", body: formData })
  .then(r => r.json())
  .then(data => {

    if(data.status === "success"){
      messageDiv.textContent = "✔ Votre choix du jour est bien réussi";
      messageDiv.style.color = "green";
    } else {
      messageDiv.textContent = "Erreur envoi";
      messageDiv.style.color = "red";
    }

  });

});

/* =========================
   🔹 TABLEAU
========================= */
function afficherTableau(departement){

  const email = emailInput.value.trim();
  if(!email) return;

  fetch(SCRIPT_URL + "?departement=" + departement + "&email=" + email)
  .then(r => r.json())
  .then(data => {

    tbody.innerHTML = "";

    const inscrits = (data.surveillances || []).length;

    const depInfo = (data.departements || []).find(d =>
      d.nom === departement
    );

    if(!depInfo) return;

    const total = depInfo.nbEnseignants || 1;
    const restant = total - inscrits;

    let pct = Math.round((inscrits / total) * 100);
    if(pct > 100) pct = 100;

    progressContainer.style.display = "block";
    progressBar.style.width = pct + "%";
    progressBar.textContent = pct + "%";

    restantDiv.textContent = "Restant : " + restant;

  });

}

/* =========================
   🔹 ARABE CHECK
========================= */
function verifierArabe(){
  const input = document.getElementById("nomPrenom");
  const regex = /^[\u0600-\u06FF\s]+$/;

  if(!regex.test(input.value)){
    messageDiv.textContent = "Veuillez écrire en arabe";
    messageDiv.style.color = "red";
  } else {
    messageDiv.textContent = "";
  }
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Surveillances - SGH Planification</title>
<style>
  body { font-family: Arial; margin:0; padding:0; background:#f4f4f4; }
  nav { background:#5F9EA0; padding:10px; }
  nav ul { list-style:none; display:flex; gap:20px; margin:0; padding:0; }
  nav ul li a { color:white; font-weight:bold; text-decoration:none; font-size:26px; }
  main { padding:20px; }
  h1, .titre-tableau, .titre-progression { font-size:26px; font-weight:bold; margin-bottom:15px; }

  label { display:block; margin-top:10px; font-weight:bold; font-size:16px; }
  input, select { padding:5px; width:250px; margin-top:5px; font-size:16px; }
  button { margin-top:15px; padding:8px 15px; background:#778899; color:white; border:none; cursor:pointer; font-weight:bold; font-size:16px; border-radius:4px; }
  button:hover { background:#5a6b7a; }
  #message { margin-top:15px; font-weight:bold; font-size:16px; }

  /* Barre de progression */
  #progressContainer { width:100%; background:#ddd; margin-top:10px; display:none; padding:10px; border-radius:5px; }
  #progressBar { width:0%; height:25px; text-align:center; color:white; line-height:25px; font-weight:bold; transition: width 0.5s ease, background-color 0.5s ease; border-radius:3px; }

  table { width:100%; border-collapse: collapse; margin-top:10px; display:none; }
  table, th, td { border:1px solid #888; }
  th, td { padding:8px; text-align:left; }

  #restant { font-weight:bold; margin-top:10px; }

  footer { background:#FF8C00; color:white; text-align:center; padding:15px; margin-top:30px; font-weight:bold; }
</style>
</head>
<body>

<nav>
  <ul>
    <li><a href="index.html">Accueil</a></li>
    <li><a href="examens.html">Examens</a></li>
    <li><a href="surveillances.html">Surveillances</a></li>
    <li><a href="depots.html">Dépôts</a></li>
    <li><a href="reclamations.html">Réclamations</a></li>
  </ul>
</nav>

<main>
  <h1>Inscription à la surveillance</h1>
  <form id="formSurveillance">
    <label>Nom et Prénom</label>
    <input type="text" id="nomPrenom" required>

    <label>Email du chef de département</label>
    <input type="email" id="email" required>

    <label>Département</label>
    <select id="departement" required>
      <option value="">Chargement...</option>
    </select>

    <label>Jour</label>
    <select id="jour" required>
      <option value="">Chargement...</option>
    </select>

    <button type="submit">Envoyer</button>
    <div id="message"></div>
  </form>

  <div id="progressContainer">
    <h1 class="titre-progression">Progression du département</h1>
    <div id="progressBar">0%</div>
    <div id="restant">Enseignants restant à s'inscrire : 0</div>
    <button id="exportExcel">Exporter en Excel</button>
  </div>

  <table id="tableDep">
    <thead>
      <tr>
        <th>Date de remplissage</th>
        <th>Nom et prénom</th>
        <th>Département</th>
        <th>Jour choisi</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</main>

<footer>
  &copy; 2026 SGH pour Planification et Programmation
</footer>

<script>
const form = document.getElementById('formSurveillance');
const messageDiv = document.getElementById('message');
const depSelect = document.getElementById('departement');
const jourSelect = document.getElementById('jour');
const progressContainer = document.getElementById('progressContainer');
const progressBar = document.getElementById('progressBar');
const tableDep = document.getElementById('tableDep');
const tbody = tableDep.querySelector('tbody');
const restantDiv = document.getElementById('restant');
const exportBtn = document.getElementById('exportExcel');

const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxQEPwh_dLKoZPyB1D1ppEPbPGWjQGP8wSsOATtUr-XaTbs7Br8FsHGf8fV60I94y4g/exec'; // mettre ton URL Apps Script

// Charger départements et jours
fetch(SCRIPT_URL)
.then(res => res.json())
.then(data => {
  depSelect.innerHTML = '<option value="">--Choisir--</option>';
  data.departements.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d.nom;
    opt.textContent = d.nom;
    depSelect.appendChild(opt);
  });
  jourSelect.innerHTML = '<option value="">--Choisir--</option>';
  data.jours.forEach(j => {
    const opt = document.createElement('option');
    opt.value = j;
    opt.textContent = j;
    jourSelect.appendChild(opt);
  });
});

// Masquer tableau et barre si changement de département
depSelect.addEventListener('change', () => {
  progressContainer.style.display = 'none';
  tableDep.style.display = 'none';
});

// Envoi du formulaire
form.addEventListener('submit', e => {
  e.preventDefault();
  messageDiv.textContent = "Envoi en cours...";
  messageDiv.style.color = "black";

  const formData = new FormData();
  formData.append('formType','surveillance');
  formData.append('nomPrenom', document.getElementById('nomPrenom').value);
  formData.append('email', document.getElementById('email').value);
  formData.append('departement', depSelect.value);
  formData.append('jour', jourSelect.value);

  fetch(SCRIPT_URL, { method:'POST', body: formData })
    .then(res => res.json())
    .then(data => {
      messageDiv.style.color = (data.status==='success')?'green':'red';
      messageDiv.textContent = data.message;
      setTimeout(()=>{ messageDiv.textContent=""; }, 3000);

      if(data.status==='success'){
        form.reset();
        afficherTableau(depSelect.value);
      }
    })
    .catch(err => {
      messageDiv.style.color='red';
      messageDiv.textContent='Erreur réseau ou serveur.';
      setTimeout(()=>{ messageDiv.textContent=""; }, 3000);
    });
});

// Affichage tableau, barre et nombre restant
function afficherTableau(departement){
  progressContainer.style.display='none';
  tableDep.style.display='none';

  fetch(SCRIPT_URL+'?departement='+encodeURIComponent(departement))
    .then(res=>res.json())
    .then(data=>{
      tbody.innerHTML="";
      data.surveillances.forEach(s=>{
        const tr=document.createElement('tr');
        tr.innerHTML=`<td>${new Date(s.date).toLocaleString()}</td><td>${s.nom}</td><td>${s.departement}</td><td>${s.jour}</td>`;
        tbody.appendChild(tr);
      });

      // Barre de progression + restant
      fetch(SCRIPT_URL)
        .then(res=>res.json())
        .then(depData=>{
          const depInfo = depData.departements.find(d=>d.nom===departement);
          const total = depInfo ? depInfo.nbEnseignants : 1;
          const inscrits = data.surveillances.length;
          const pct = Math.min(100, Math.round((inscrits/total)*100));
          progressBar.style.width = pct+'%';
          progressBar.textContent = pct+'%';
          restantDiv.textContent = `Enseignants restant à s'inscrire : ${total - inscrits}`;

          if(pct<50) progressBar.style.background="#f44336";
          else if(pct<80) progressBar.style.background="#ff9800";
          else if(pct<100) progressBar.style.background="#2196F3";
          else progressBar.style.background="#4CAF50";

          progressContainer.style.display='block';
          tableDep.style.display='table';
        });
    });
}

// Export Excel
exportBtn.addEventListener('click', ()=>{
  const dep = depSelect.value;
  if(!dep) return alert("Choisir un département");
  window.open(SCRIPT_URL+'?departement='+encodeURIComponent(dep)+'&export=excel', '_blank');
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Surveillances - SGH Planification</title>

<style>
body { font-family: Arial; margin:0; padding:0; background:#f4f4f4; }
nav { background:#5F9EA0; padding:10px; }
nav ul { list-style:none; display:flex; gap:20px; margin:0; padding:0; }
nav ul li a { color:white; font-weight:bold; text-decoration:none; font-size:26px; }

main { padding:20px; }

label { display:block; margin-top:10px; font-weight:bold; }
input, select { padding:6px; width:250px; margin-top:5px; }

button {
  margin-top:15px;
  padding:8px 15px;
  background:#778899;
  color:white;
  border:none;
  cursor:pointer;
  font-weight:bold;
  border-radius:4px;
}

button:hover { background:#5a6b7a; }

#message { margin-top:10px; font-weight:bold; }

#progressContainer { display:none; margin-top:15px; padding:10px; background:#ddd; border-radius:5px; }

#progressBar {
  height:25px;
  width:0%;
  background:#4CAF50;
  color:white;
  text-align:center;
  line-height:25px;
}

table { width:100%; margin-top:15px; border-collapse:collapse; display:none; }
th, td { border:1px solid #999; padding:8px; }

#exportBtn { display:none; background:#4CAF50; }
</style>
</head>

<body>

<nav>
<ul>
<li><a href="index.html">Accueil</a></li>
<li><a href="examens.html">Examens</a></li>
<li><a href="surveillances.html">Surveillances</a></li>
</ul>
</nav>

<main>

<h2>Inscription Surveillances</h2>

<form id="formSurveillance">

<label>Nom et Prénom</label>
<input type="text" id="nomPrenom" required>

<label>Email chef département</label>
<input type="email" id="email" required>

<label>Département</label>
<select id="departement"></select>

<label>Jour</label>
<select id="jour"></select>

<button type="submit">Envoyer</button>
<button type="button" onclick="verifierChef()">Vérifier Chef</button>

<div id="message"></div>

</form>

<!-- PROGRESSION -->
<div id="progressContainer">
<div id="progressBar">0%</div>
<div id="restant"></div>
</div>

<!-- TABLE -->
<table id="tableDep">
<thead>
<tr>
<th>Date</th><th>Nom</th><th>Département</th><th>Jour</th>
</tr>
</thead>
<tbody></tbody>
</table>

<!-- EXPORT -->
<button id="exportBtn">Exporter Excel</button>

</main>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyZg4xjXxVHMwezbmL3YgdBN-2vudMsaMQ_ScvSV5MsrJn5Mwk6HdRt_wROb2nFk-jc/exec";

let chefValide = false;

const depSelect = document.getElementById("departement");
const jourSelect = document.getElementById("jour");
const table = document.getElementById("tableDep");
const tbody = table.querySelector("tbody");
const exportBtn = document.getElementById("exportBtn");
const progressBar = document.getElementById("progressBar");
const progressContainer = document.getElementById("progressContainer");
const restant = document.getElementById("restant");
const message = document.getElementById("message");

/* ================= CHARGEMENT ================= */
fetch(SCRIPT_URL)
.then(r => r.json())
.then(data => {

  depSelect.innerHTML = "<option value=''>Choisir</option>";
  data.departements.forEach(d => {
    depSelect.innerHTML += `<option value="${d.nom}">${d.nom}</option>`;
  });

  jourSelect.innerHTML = "<option value=''>Choisir</option>";
  data.jours.forEach(j => {
    jourSelect.innerHTML += `<option value="${j}">${j}</option>`;
  });

});

/* ================= VERIFICATION CHEF ================= */
function verifierChef() {

  let email = document.getElementById("email").value;
  let dep = depSelect.value;

  fetch(SCRIPT_URL + "?action=check&email=" + email + "&departement=" + dep)
  .then(r => r.json())
  .then(res => {

    if(res.status === "ok") {
      chefValide = true;
      exportBtn.style.display = "block";
      alert("Chef validé");
    } else {
      chefValide = false;
      exportBtn.style.display = "none";
      alert("Email ou département incorrect");
    }

  });

}

/* ================= ENVOI ================= */
document.getElementById("formSurveillance").addEventListener("submit", e => {

  e.preventDefault();

  let fd = new FormData();
  fd.append("formType","surveillance");
  fd.append("nomPrenom", document.getElementById("nomPrenom").value);
  fd.append("email", document.getElementById("email").value);
  fd.append("departement", depSelect.value);
  fd.append("jour", jourSelect.value);

  fetch(SCRIPT_URL, {method:"POST", body:fd})
  .then(r=>r.json())
  .then(res=>{

    message.textContent = res.message;

    if(res.status === "success") {
      loadTable(depSelect.value);
    }

  });

});

/* ================= TABLE ================= */
function loadTable(dep){

  fetch(SCRIPT_URL + "?departement=" + dep)
  .then(r=>r.json())
  .then(data=>{

    tbody.innerHTML = "";

    data.surveillances.forEach(s=>{
      tbody.innerHTML += `
      <tr>
        <td>${new Date(s.date).toLocaleString()}</td>
        <td>${s.nom}</td>
        <td>${s.departement}</td>
        <td>${s.jour}</td>
      </tr>`;
    });

    fetch(SCRIPT_URL)
    .then(r=>r.json())
    .then(all=>{

      let info = all.departements.find(d=>d.nom===dep);
      let total = info ? info.nbEnseignants : 1;

      let inscrit = data.surveillances.length;
      let pct = Math.round((inscrit/total)*100);

      progressContainer.style.display = "block";
      table.style.display = "table";

      progressBar.style.width = pct + "%";
      progressBar.textContent = pct + "%";

      restant.textContent = "Restant : " + (total - inscrit);

    });

  });

}

/* ================= EXPORT ================= */
exportBtn.onclick = function(){

  if(!chefValide){
    alert("Validez chef d'abord");
    return;
  }

  let dep = depSelect.value;

  window.open(
    SCRIPT_URL + "?export=excel&departement=" + dep,
    "_blank"
  );

};

</script>

</body>
</html>

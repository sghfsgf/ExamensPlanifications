<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Surveillances - SGH Planification</title>

  <style>
    body { font-family: Arial; margin:0; padding:0; background:#f4f4f4; }

    nav { background:#5F9EA0; padding:10px; }
    nav ul { list-style:none; display:flex; gap:20px; margin:0; padding:0; }
    nav ul li a { color:white; font-weight:bold; text-decoration:none; font-size:20px; }

    main { padding:20px; }

    h1 { font-size:18px; }

    label { display:block; margin-top:10px; font-weight:bold; }
    input, select {
      padding:6px;
      width:300px;
      margin-top:5px;
    }

    button {
      margin-top:15px;
      padding:8px 15px;
      background:#778899;
      color:white;
      border:none;
      cursor:pointer;
      border-radius:4px;
    }

    button:hover { background:#5a6b7a; }

    #message { margin-top:10px; font-weight:bold; }

    /* PROGRESSION */
    #progressContainer {
      width:100%;
      background:#ddd;
      margin-top:20px;
      padding:10px;
      display:none;
      border-radius:5px;
    }

    #progressBar {
      width:0%;
      height:25px;
      text-align:center;
      color:white;
      line-height:25px;
      border-radius:5px;
      transition:0.4s;
    }

    #restant { margin-top:5px; font-weight:bold; }

    table {
      width:100%;
      margin-top:20px;
      border-collapse:collapse;
      display:none;
    }

    table, th, td {
      border:1px solid #999;
    }

    th, td {
      padding:8px;
    }

    footer {
      margin-top:30px;
      background:#FF8C00;
      color:white;
      text-align:center;
      padding:15px;
    }
  </style>
</head>

<body>

<nav>
  <ul>
    <li><a href="#">Accueil</a></li>
    <li><a href="#">Examens</a></li>
    <li><a href="#">Surveillances</a></li>
  </ul>
</nav>

<main>

<h1>Inscription à la surveillance</h1>

<form id="formSurveillance">

  <label>Nom et Prénom</label>
  <input type="text" id="nomPrenom" required>

  <label>Email du chef</label>
  <input type="email" id="email" required>

  <label>Département</label>
  <select id="departement">
    <option>Chargement...</option>
  </select>

  <label>Jour</label>
  <select id="jour">
    <option>Chargement...</option>
  </select>

  <button type="submit">Envoyer</button>

  <div id="message"></div>
</form>


<div id="progressContainer">
  <div id="progressBar">0%</div>
  <div id="restant"></div>
</div>


<table id="tableDep">
  <thead>
    <tr>
      <th>Date</th>
      <th>Nom</th>
      <th>Département</th>
      <th>Jour</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<button id="exportPDFBtn">Exporter PDF</button>

</main>

<footer>
  © 2026 SGH Planification
</footer>


<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyZg4xjXxVHMwezbmL3YgdBN-2vudMsaMQ_ScvSV5MsrJn5Mwk6HdRt_wROb2nFk-jc/exec";

const form = document.getElementById("formSurveillance");
const depSelect = document.getElementById("departement");
const jourSelect = document.getElementById("jour");
const emailInput = document.getElementById("email");

const messageDiv = document.getElementById("message");
const progressContainer = document.getElementById("progressContainer");
const progressBar = document.getElementById("progressBar");
const restantDiv = document.getElementById("restant");

const table = document.getElementById("tableDep");
const tbody = table.querySelector("tbody");


// =======================
// CHARGEMENT INIT
// =======================
fetch(SCRIPT_URL)
.then(r => r.json())
.then(data => {

  const deps = data.departements || [];
  const jours = data.jours || [];

  depSelect.innerHTML = '<option value="">--Choisir--</option>';
  deps.forEach(d => {
    depSelect.innerHTML += `<option value="${d.nom}">${d.nom}</option>`;
  });

  jourSelect.innerHTML = '<option value="">--Choisir--</option>';
  jours.forEach(j => {
    jourSelect.innerHTML += `<option value="${j}">${j}</option>`;
  });

});


// =======================
// AFFICHAGE AUTOMATIQUE
// =======================
depSelect.addEventListener("change", () => {
  if(depSelect.value) afficher(depSelect.value);
});

emailInput.addEventListener("blur", () => {
  if(depSelect.value) afficher(depSelect.value);
});


function afficher(dep){

  const email = emailInput.value.trim();
  if(!email) return;

  fetch(`${SCRIPT_URL}?departement=${dep}&email=${email}`)
  .then(r => r.json())
  .then(data => {

    tbody.innerHTML = "";

    const list = data.surveillances || [];

    if(list.length === 0){
      tbody.innerHTML = "<tr><td colspan='4'>Aucune donnée</td></tr>";
      return;
    }

    table.style.display = "table";
    progressContainer.style.display = "block";

    list.forEach(s => {
      tbody.innerHTML += `
        <tr>
          <td>${new Date(s.date).toLocaleString()}</td>
          <td>${s.nom}</td>
          <td>${s.departement}</td>
          <td>${s.jour}</td>
        </tr>`;
    });

    // progression
    const depInfo = (data.departements || []).find(d => d.nom === dep);
    const total = depInfo?.nbEnseignants || 1;

    const pct = Math.min(100, Math.round((list.length / total) * 100));

    progressBar.style.width = pct + "%";
    progressBar.textContent = pct + "%";

    progressBar.style.background =
      pct < 50 ? "red" :
      pct < 80 ? "orange" : "green";

    restantDiv.textContent = "Restant : " + (total - list.length);

  });

}


// =======================
// SUBMIT FORM
// =======================
form.addEventListener("submit", e => {
  e.preventDefault();

  const fd = new FormData();
  fd.append("formType","surveillance");
  fd.append("nomPrenom", document.getElementById("nomPrenom").value);
  fd.append("email", emailInput.value);
  fd.append("departement", depSelect.value);
  fd.append("jour", jourSelect.value);

  fetch(SCRIPT_URL, {method:"POST", body:fd})
  .then(r => r.json())
  .then(data => {

    messageDiv.textContent = data.message;
    messageDiv.style.color = data.status === "success" ? "green" : "red";

    if(data.status === "success"){
      form.reset();
      afficher(depSelect.value);
    }

  });

});


// =======================
// EXPORT PDF
// =======================
document.getElementById("exportPDFBtn").onclick = function(){

  const dep = depSelect.value;
  if(!dep) return alert("Choisir département");

  window.open(SCRIPT_URL + "?export=pdf&departement=" + dep);

};

</script>

</body>
</html>
